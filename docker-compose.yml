services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pruview-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://pruview.in
    container_name: pruview-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend